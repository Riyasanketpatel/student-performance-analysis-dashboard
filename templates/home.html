<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Dashboard</title>

    <style>

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #dbeafe, #eef2ff);
            min-height: 100vh;
        }

        /* CONTAINER */

        .container {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 1s ease;
        }

        /* TITLE */

        .main-title {
            font-size: 46px;
            font-weight: 700;
            color: #1f2933;
            margin-bottom: 10px;
        }

        .sub-title {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 70px;
            letter-spacing: 0.5px;
        }

        /* CARD LAYOUT */

        .card-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* PREMIUM GLASS CARD */

        .card {
            width: 270px;
            height: 170px;
            border-radius: 22px;
            text-decoration: none;
            color: #1f2933;
            font-size: 19px;
            font-weight: 600;

            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(14px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.35s ease;
        }

        /* ICON */

        .card span {
            font-size: 34px;
            margin-bottom: 12px;
        }

        /* HOVER EFFECT */

        .card:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 25px 60px rgba(59,130,246,0.25);
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
        }

        /* ENTRY ANIMATION */

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

</style>
</head>

<body>

<div class="container">

    <div class="main-title">
    Student Performance Dashboard
</div>

<div class="sub-title">
    Behaviour Analysis • Machine Learning Models • Smart Predictions
</div>

    <div class="card-container">

        <a href="/visualization" class="card">
            <span>📊</span>
            Data Visualization
        </a>

        <a href="/model-comparison" class="card">
            <span>🤖</span>
            Model Comparison
        </a>

        <a href="/prediction" class="card">
            <span>🎯</span>
            Score Prediction
        </a>

    </div>

</div>

</body>
</html>
