<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

<style>

body{
    font-family:Poppins,sans-serif;
    background:linear-gradient(to right,#eef2f3,#dfe9f3);
}

.container{
    width:450px;
    margin:80px auto;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 30px rgba(0,0,0,0.15);
    text-align:center;
}

.score{
    font-size:65px;
    font-weight:bold;
    margin:20px 0;
}

.badge{
    padding:8px 18px;
    border-radius:25px;
    color:white;
    font-size:18px;
    display:inline-block;
}

.progress{
    width:100%;
    height:18px;
    background:#eee;
    border-radius:10px;
    margin:25px 0;
}

.progress-bar{
    height:100%;
    border-radius:10px;
}

.message{
    font-size:16px;
    margin-top:10px;
    color:#555;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#4facfe;
    color:white;
    border-radius:8px;
    text-decoration:none;
}

.btn:hover{
    background:#00c6ff;
}

</style>

</head>

<body>

<div class="container">

    <h2>Predicted Exam Score</h2>

    <div class="score" style="color:{{color}}">
        {{score}}
    </div>

    <div class="badge" style="background:{{color}}">
        {{label}}
    </div>

    <div class="progress">
        <div class="progress-bar" style="width:{{score}}%; background:{{color}};"></div>
    </div>

    <div class="message">
        {{message}}
    </div>

    <a href="/prediction" class="btn">Predict Again</a>

    <br>

    <a href="/" class="btn">Go to Dashboard</a>

</div>

</body>
</html>
